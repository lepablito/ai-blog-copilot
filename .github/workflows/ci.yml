name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      # No network access is needed: every test injects its fetcher or mocks
      # httpx with respx. A test that starts needing the internet has stopped
      # being a unit test.
      - name: Test
        run: uv run pytest --cov=src --cov-report=term-missing
