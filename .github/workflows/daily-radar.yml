name: Daily radar

on:
  # Nightly. 01:00 UTC is roughly 03:00 in Madrid and 21:00 the previous day on
  # the US east coast, so a pass lands after both a European and an American
  # working day and the topics are waiting by breakfast.
  #
  # Cron here is always UTC and GitHub does not follow daylight saving, so this
  # drifts an hour against local time between summer and winter. That is fine
  # at 3am; it would not be if the slot were near a boundary.
  #
  # Quota is no longer the reason to hold back — NIM leads the chain and its
  # free tier absorbs a daily pass. Gemini is the reserve tier and only sees
  # traffic when NIM fails, which keeps its 20-requests-a-day budget intact for
  # manual dispatches. Calls are paced 12s apart, so a run takes a few minutes.
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "How far back to look"
        default: "48"
      max_steps:
        description: "Step limit for the ReAct loop"
        default: "8"

# Two runs writing data/topics.json at once would race on the commit.
concurrency:
  group: daily-radar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra radar

      - name: Restore history
        uses: actions/cache@v4
        with:
          # radar.db is not committed — it is a binary that would grow a diff
          # every day. The cache keeps history across runs; data/topics.json is
          # the durable, reviewable copy.
          path: radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Run the radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          # No Ollama on a runner, so the chain here is NIM -> Gemini. If both
          # fail the step exits non-zero and nothing is committed: a bad run
          # must not overwrite a good file.
        run: |
          uv run python -m radar.run \
            --hours "${{ github.event.inputs.hours || 48 }}" \
            --max-steps "${{ github.event.inputs.max_steps || 8 }}" \
            --export data/topics.json

      - name: Commit if the topics changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first, then compare against the index: `git diff` alone is
          # blind to an untracked file, so on the very first run — the one that
          # creates data/topics.json — it would report no change and skip the
          # commit entirely.
          git add data/topics.json
          if git diff --cached --quiet -- data/topics.json; then
            echo "No new topics today — nothing to commit."
            exit 0
          fi

          git commit -m "Daily radar: $(date -u +%Y-%m-%d)"
          git push
